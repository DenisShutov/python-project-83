{% if messages %}
    <ul>
        {% for category, message in messages %}
            <li class="{{category}}">{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}

<h1>Сайт: {{ url.name }}</h1>
<table>
    <tr>
        <td>{{ url.id }}</td>
        <td>{{ url.name }}</td>
        <td>{{ url.created_at }}</td>
    </tr>
</table>
